<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heni Way</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bleu-sombre: #003366; 
            --bleu-ocean: #006699; 
            --jaune-soleil: #FFD700; 
            --blanc: #FFFFFF;
            --input-bg: #FFFFFF;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.35)), 
                        url('https://jzyunzjhjamoosctqoor.supabase.co/storage/v1/object/public/Image_Heni-Way/Nosy\ Iranja.jpg') no-repeat center center/cover;            
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            text-align: center;
            z-index: 10;
            background: rgba(0, 51, 102, 0.15);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .logo-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 25px auto;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            padding: 6px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
        }

        .login-title {
            color: var(--blanc);
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 2px;
            text-transform: uppercase;
        }
        .login-subtitle {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 35px;
        }

        .input-group-pill {
            background-color: var(--input-bg);
            border-radius: 30px;
            padding: 2px 5px;
            margin-bottom: 22px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }
        .input-group-pill:focus-within {
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.15);
        }

        .form-control-pill {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            padding: 13px 25px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #021124 !important;
            text-align: center;
        }
        .form-control-pill::placeholder {
            color: #999999;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.78rem;
        }

        .eye-span-pill {
            background: transparent !important;
            border: none !important;
            cursor: pointer;
            padding-right: 20px;
            display: flex;
            align-items: center;
        }
        .eye-span-pill i {
            color: #999999;
            transition: color 0.2s;
        }
        .eye-span-pill:hover i {
            color: var(--bleu-sombre);
        }

        .btn-login-outline {
            background: transparent;
            color: var(--blanc);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            padding: 12px 55px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.88rem;
            margin-top: 15px;
            transition: all 0.3s ease;
        }
        .btn-login-outline:hover {
            background-color: var(--blanc);
            color: var(--bleu-sombre);
            border-color: var(--blanc);
            box-shadow: 0 5px 20px rgba(255, 255, 255, 0.25);
        }

        .btn-register-submit {
            background-color: var(--jaune-soleil);
            color: var(--bleu-sombre);
            font-weight: 600;
            border-radius: 30px;
            padding: 14px;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-register-submit:hover {
            background-color: var(--bleu-ocean);
            color: var(--blanc);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 102, 153, 0.2);
        }
    </style>
</head>
<body>

    <div class="login-box">
        
        <div class="logo-container">
            <img src="https://jzyunzjhjamoosctqoor.supabase.co/storage/v1/object/public/Image_Heni-Way/Logo.png" alt="Logo Heni Way" class="logo-img" onerror="this.style.opacity='0';">
        </div>

        <h1 class="login-title">Connexion</h1>
        <p class="login-subtitle">Bienvenue</p>

        <form id="vector-login-form" action="/api/auth/Administrateur" method="POST" enctype="application/json">
            <div class="input-group-pill">
                <input name="email" type="email" class="form-control form-control-pill" id="login-username" placeholder="Adresse e-mail" required autocomplete="off">
            </div>

            <div class="input-group-pill d-flex">
                <input name="password" type="password" class="form-control form-control-pill flex-grow-1" id="login-password" placeholder="Mot de passe" required>
                <span class="eye-span-pill" id="toggle-password-visibility">
                    <i class="fa-solid fa-eye" id="toggle-password-icon"></i>
                </span>
            </div>

            <button type="submit" class="btn btn-login-outline">Se connecter</button>

        </form>
    </div>

    <div class="modal fade" id="EmailError" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="successModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content modal-content-custom p-4 text-center">
                <div class="modal-body">
                    <div class="modal-icon mb-3 text-danger" style="font-size: 40px;">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                    </div>
                    <h3 class="fw-bold mb-2" style="color: var(--bleu-sombre);">Désolé</h3>
                    <p class="text-muted mb-4">
                        E-mail ou mot de passe incorrect. Veuillez vérifier vos informations et réessayer.
                    </p>
                    <button type="button" class="btn btn-register-submit px-5" data-bs-dismiss="modal">Compris !</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const togglePasswordSpan = document.getElementById('toggle-password-visibility');
        const passwordInput = document.getElementById('login-password');
        const passwordIcon = document.getElementById('toggle-password-icon');

        if (togglePasswordSpan && passwordInput && passwordIcon) {
            togglePasswordSpan.addEventListener('click', () => {
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    passwordIcon.classList.remove('fa-eye');
                    passwordIcon.classList.add('fa-eye-slash');
                } else {
                    passwordInput.type = 'password';
                    passwordIcon.classList.remove('fa-eye-slash');
                    passwordIcon.classList.add('fa-eye');
                }
            });
        }

        const loginForm = document.getElementById('vector-login-form');
        if (loginForm) {
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const formdata = new FormData(loginForm);
                const data = Object.fromEntries(formdata.entries());
                try {
                    const result = await fetch(loginForm.action, {
                        method: loginForm.method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    })

                    const response = await result.json();

                    if (response.succes === true){
                        localStorage.setItem('Token_HeniWay', response.token);
                        window.location.href = '/Heni-Way/dashAdmin'';
                    }else if (response.succes === false){
                        const emailErrorModal = new bootstrap.Modal(document.getElementById('EmailError'));
                        emailErrorModal.show();
                    }
                } catch (error) {
                    alert(error);
                }
                loginForm.reset();
                
                if (passwordInput) passwordInput.type = 'password';
                if (passwordIcon) {
                    passwordIcon.classList.remove('fa-eye-slash');
                    passwordIcon.classList.add('fa-eye');
                }
            });
        }
    </script>
</body>
</html
